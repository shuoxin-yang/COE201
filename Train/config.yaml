global:
  model_name: Qwen3.5-2B
  train_data_path: /root/autodl-tmp/COE201/QA_Gen/data/QA_Augmentation
  max_length: 1024
  train_size: 0.7
  eval_size: 0.1
  test_size: 0.2
  seed: 42
  output_dir: ./logs
  tensorboard_logdir: ~/tf-logs
  logging_steps: 10
  test_eval_epochs: 1
  save_steps: 500
  save_total_limit: 3

LoRA:
  num_epochs: 15
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  rank: 4
  alpha: 8
  scaling_type: r/a
  dropout_rate: 0.00
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - in_proj_qkv
    - out_proj
  target_layer_side: all
  target_layer_count: 0
  init_lora_weights: gaussian

PrefixFT:
  num_epochs: 5
  batch_size: 3
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  num_virtual_tokens: 20
  prefix_projection: false
  init_weights: true

AdapterFinetuning:
  num_epochs: 5
  batch_size: 3
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  target_modules: self_attn
  adapter_len: 10
  adapter_layers: 4
